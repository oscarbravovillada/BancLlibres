<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Banc de Llibres</title>

    <style>
        body{
            margin:0;
            font-family: Arial, Helvetica, sans-serif;
            background: linear-gradient(135deg,#020617,#1e40af);
            height:100vh;
            display:flex;
            align-items:center;
            justify-content:center;
            color:white;
        }

        .login-box{
            background: rgba(255,255,255,0.05);
            padding:40px;
            border-radius:12px;
            width:300px;
            backdrop-filter: blur(10px);
            box-shadow:0 0 25px rgba(0,0,0,0.3);
        }

        h2{
            text-align:center;
            margin-bottom:20px;
        }

        input{
            width:100%;
            padding:10px;
            margin:10px 0;
            border:none;
            border-radius:6px;
        }

        button{
            width:100%;
            padding:10px;
            background:#3b82f6;
            border:none;
            color:white;
            border-radius:6px;
            cursor:pointer;
            margin-top:10px;
        }

        button:hover{
            background:#2563eb;
        }

        .back{
            display:block;
            text-align:center;
            margin-top:15px;
            color:#93c5fd;
            text-decoration:none;
            font-size:14px;
        }
    </style>
</head>
<body>

<div class="login-box">
    <h2>Iniciar Sesión</h2>

    <form onsubmit="login(event)">
        <input type="text" placeholder="Usuario" id="user" required>
        <input type="password" placeholder="Contraseña" id="pass" required>

        <button type="submit">Entrar</button>
    </form>

    <a href="index.html" class="back">Volver</a>
</div>

<script>
function login(e){
    e.preventDefault();

    const user = document.getElementById("user").value;
    const pass = document.getElementById("pass").value;

    // login simple temporal
    if(user === "admin" && pass === "admin"){
        window.location.href = "dashboard.html";
    }else{
        alert("Usuario o contraseña incorrectos");
    }
}
</script>

</body>
</html>
