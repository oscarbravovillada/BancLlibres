<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Banc de Llibres</title>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#0f172a,#1e3a8a);
color:white;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.box{
background:rgba(255,255,255,0.05);
padding:30px;
border-radius:10px;
}

input{
display:block;
width:250px;
margin:10px 0;
padding:10px;
border:none;
border-radius:6px;
}

button{
width:100%;
padding:10px;
background:#3b82f6;
border:none;
color:white;
border-radius:6px;
cursor:pointer;
}
</style>
</head>

<body>

<div class="box">
<h2>Iniciar sesión</h2>

<input type="text" placeholder="Usuario">
<input type="password" placeholder="Contraseña">

<button onclick="location.href='dashboard.html'">
Entrar
</button>

</div>

</body>
</html>
